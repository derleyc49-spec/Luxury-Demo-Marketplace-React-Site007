<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LUXORA</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="hero">

  <nav class="navbar">

    <div class="logo">LUXORA</div>

    <ul>
      <li><a href="#cars">Carros</a></li>
      <li><a href="#homes">Casas</a></li>
      <li><a href="#tech">Tecnologia</a></li>
    </ul>

    <div class="cart">
      🛒 <span id="cartCount">0</span>
    </div>

  </nav>

  <div class="heroContent">
    <h1>LUXORA</h1>
    <p>Marketplace de luxo em demonstração</p>
    <button onclick="scrollToSection()">Explorar</button>
  </div>

</header>

<section id="cars" class="section">
  <h2>Carros Premium</h2>
  <div id="carsProducts" class="grid"></div>
</section>

<section id="homes" class="section dark">
  <h2>Casas de Luxo</h2>
  <div id="homesProducts" class="grid"></div>
</section>

<section id="tech" class="section">
  <h2>Tecnologia</h2>
  <div id="techProducts" class="grid"></div>
</section>

<footer>
  <h3>LUXORA</h3>
</footer>

<script src="script.js"></script>

</body>
</html>
